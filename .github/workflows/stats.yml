name: Generate Metrics

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: bozdemir
          filename: metrics.overview.svg
          template: classic
          base: "header, activity, community, repositories, metadata"
          base_indepth: yes
          repositories_affiliations: "owner, collaborator, organization_member"
          repositories: 500
          config_timezone: Europe/Istanbul
          plugin_lines: yes

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: bozdemir
          filename: metrics.languages.svg
          template: classic
          base: ""
          repositories_affiliations: "owner, collaborator, organization_member"
          repositories: 500
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 12
          plugin_languages_details: "percentage, lines, bytes"
          plugin_languages_ignored: "html, css, scss, tex, makefile, dockerfile"
          plugin_languages_categories: "programming, markup"
          plugin_languages_threshold: 0%
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 30
          plugin_languages_recent_load: 5000
          plugin_languages_recent_days: 365
          plugin_languages_recent_categories: "programming, markup"
          plugin_languages_sections: "most-used, recently-used"
          config_timezone: Europe/Istanbul
